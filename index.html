<title>Studio Character – Enhanced Gesture Control</title>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/examples/jsm/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #305CDE;
}
#webcamContainer {
  position: fixed;
  top: 12px;
  right: 12px;
  width: 108px;
  height: 144px;
  opacity: 1;
  pointer-events: none;
  z-index: 4500;
}

#webcamFrame {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-radius: 14px;
  background: #0f0f12;
  border: 1px solid rgba(255, 255, 255, 0.35);
  box-shadow:
    0 16px 30px rgba(0, 0, 0, 0.28),
    0 2px 0 rgba(255, 255, 255, 0.12) inset;
}

#webcamChrome {
  height: 18px;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 8px;
  background: linear-gradient(180deg, #fcfcfd 0%, #ececef 100%);
  border-bottom: 1px solid rgba(0, 0, 0, 0.14);
}

.webcamDot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  opacity: 0.95;
}

.webcamDot.red { background: #ff5f57; }
.webcamDot.yellow { background: #febc2e; }
.webcamDot.green { background: #28c840; }

#webcamViewport {
  position: relative;
  flex: 1;
  margin: 3px;
  border-radius: 0 0 10px 10px;
  overflow: hidden;
  background: #17181c;
}

#webcam {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#overlayCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

#gestureIndicator {
  display: none;
}

#gestureIndicator.active {
  opacity: 1;
  background: rgba(76, 175, 80, 0.95);
  color: white;
}

</style>
</head>

<body>

<div id="webcamContainer">
  <div id="webcamFrame">
    <div id="webcamChrome">
      <span class="webcamDot red"></span>
      <span class="webcamDot yellow"></span>
      <span class="webcamDot green"></span>
    </div>
    <div id="webcamViewport">
      <video id="webcam" autoplay playsinline></video>
      <canvas id="overlayCanvas"></canvas>
    </div>
  </div>
</div>

<div id="gestureIndicator"></div>
